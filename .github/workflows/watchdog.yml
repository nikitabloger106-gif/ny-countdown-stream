name: watchdog

on:
  workflow_run:
    workflows: ["scheduled-render"]
    types:
      - completed

jobs:
  restart-on-failure:
    if: ${{ github.event.workflow_run.conclusion == 'failure' || github.event.workflow_run.conclusion == 'cancelled' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scheduled-render again
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run scheduled-render --repo ${{ github.repository }}

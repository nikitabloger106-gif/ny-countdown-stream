name: scheduled-render

on:
  workflow_dispatch:
  schedule:
    - cron: '7 0 * * *'
    - cron: '52 5 * * *'
    - cron: '37 11 * * *'
    - cron: '22 17 * * *'

concurrency:
  group: stream-lock
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            sudo apt-get update && sudo apt-get install -y xvfb ffmpeg wget python3 && break
            echo "Попытка $i не удалась, повтор через 10 секунд..."
            sleep 10
          done
          for i in 1 2 3; do
            wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb && break
            echo "Попытка $i не удалась, повтор через 10 секунд..."
            sleep 10
          done
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2

      - name: Serve HTML locally
        run: |
          python3 -m http.server 8000 &
          sleep 2

      - name: Launch Chrome
        run: |
          export DISPLAY=:99
          mkdir -p /tmp/chrome-profile
          google-chrome-stable --kiosk --no-sandbox --disable-infobars --disable-dev-shm-usage --autoplay-policy=no-user-gesture-required --no-first-run --no-default-browser-check --disable-sync --disable-background-networking --disable-default-apps --disable-popup-blocking --disable-translate --disable-features=Translate,TranslateUI --lang=ru-RU --accept-lang=ru-RU --user-data-dir=/tmp/chrome-profile --window-position=0,0 --window-size=1920,1080 http://localhost:8000/index.html &
          sleep 8

      - name: Stream to YouTube
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          export DISPLAY=:99
          END_TIME=$(( $(date +%s) + 20700 ))
          while [ $(date +%s) -lt $END_TIME ]; do
            ffmpeg -f x11grab -video_size 1920x1080 -framerate 30 -i :99.0 -stream_loop -1 -i music.mp3 -vcodec libx264 -preset veryfast -maxrate 4500k -bufsize 9000k -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -ar 44100 -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
            echo "Соединение оборвалось, переподключение через 3 секунды..."
            sleep 3
          done

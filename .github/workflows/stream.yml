name: YouTube 24/7 Stream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
    - cron: '45 5 * * *'
    - cron: '30 11 * * *'
    - cron: '15 17 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg wget python3
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2

      - name: Serve HTML locally
        run: |
          python3 -m http.server 8000 &
          sleep 2

      - name: Launch Chrome
        run: |
          export DISPLAY=:99
          mkdir -p /tmp/chrome-profile
          google-chrome-stable --kiosk --no-sandbox --disable-infobars --autoplay-policy=no-user-gesture-required --no-first-run --no-default-browser-check --disable-sync --disable-background-networking --disable-default-apps --disable-popup-blocking --disable-features=Translate,TranslateUI --lang=en-US --user-data-dir=/tmp/chrome-profile --window-position=0,0 --window-size=1920,1080 http://localhost:8000/index.html &
          sleep 5

      - name: Stream to YouTube
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          export DISPLAY=:99
          ffmpeg -f x11grab -video_size 1920x1080 -framerate 30 -i :99.0 -f lavfi -i anullsrc=channel_layout=stereo:sample_rate=44100 -vcodec libx264 -preset veryfast -maxrate 4500k -bufsize 9000k -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -ar 44100 -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"

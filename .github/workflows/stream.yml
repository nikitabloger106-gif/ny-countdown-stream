name: YouTube 24/7 Stream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
    - cron: '45 5 * * *'
    - cron: '30 11 * * *'
    - cron: '15 17 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg wget python3
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2

      - name: Serve HTML locally
        run: |
          python3 -m http.server 8000 &
          sleep 2

- name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2

      - name: Stream to YouTube
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          export DISPLAY=:99
          ffmpeg -f x11grab -video_size 1280x720 -framerate 30 -i :99.0 -f lavfi -i anullsrc=channel_layout=stereo:sample_rate=44100 -vcodec libx264 -preset veryfast -maxrate 3000k -bufsize 6000k -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -ar 44100 -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
          

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Year 2027 - Elite Live Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;800;900&family=Unbounded:wght@500;700;800;900&display=swap');

        :root {
            --bg-deep: #030a12;
            --accent-blue: #4da6ff; 
            --glass: rgba(255, 255, 255, 0.05); 
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-variant-numeric: tabular-nums; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #1c2340;
            color: #ffffff;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            margin: 0;
        }


        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }

        #weather-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            display: block;
        }

        .dashboard {
            display: grid;
            grid-template-columns: clamp(360px, 22vw, 440px) 1fr; 
            grid-template-rows: 1fr;
            align-items: stretch;
            gap: 40px;
            width: 96vw; height: 92vh;
            z-index: 1;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 18px;
            border: 2px solid rgba(255, 255, 255, 0.45);
            padding: 40px;
            box-shadow: 
                0 30px 70px 10px rgba(0, 0, 0, 0.6),
                0 0 110px 25px rgba(77, 166, 255, 0.14),
                inset 0 1px 0 rgba(255, 255, 255, 0.22),
                inset 0 0 70px rgba(77, 166, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .dashboard::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 55%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.055) 0%, rgba(255, 255, 255, 0) 100%);
            pointer-events: none;
        }

        .sidebar-left {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            position: relative;
            padding-right: 35px;
        }

        .sidebar-left::after {
            content: '';
            position: absolute;
            top: -40px;
            bottom: -40px;
            right: 0;
            width: 4px;
            background: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 16px 1px rgba(255, 255, 255, 0.25);
        }

        .hero-center {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            position: relative;
            text-align: center;
            padding-top: 20px;
        }

        .block {
            background: transparent;
            position: relative;
            display: flex; 
            flex-direction: column;
        }

        .city-widget {
            flex-grow: 1;
            justify-content: center;
            position: relative;
        }

        #flag-bg { 
            position: absolute; 
            inset: -10px; 
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            background-position: center; 
            filter: blur(28px) brightness(0.65) saturate(1.15); 
            opacity: 0.6; 
            z-index: -1; 
            transition: 1.5s; 
            border-radius: 30px;
        }

        .city-text-container { display: flex; flex-direction: column; align-items: flex-start; z-index: 2; width: 100%; }
        
        .weather-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 8px 20px;
            border-radius: 24px;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 24px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            align-self: flex-start;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.12);
        }
        .weather-badge img {
            width: 38px;
            height: 38px;
            filter: drop-shadow(0 0 4px rgba(255,255,255,0.25));
            display: block;
        }
        .weather-temp {
            color: #ffffff;
        }
        .weather-desc {
            color: rgba(255, 255, 255, 0.75);
            font-weight: 400;
            font-size: 1.0rem;
            text-transform: lowercase;
        }

        #city-name { font-size: 3.2rem; font-weight: 900; letter-spacing: -1px; color: #ffffff; margin-bottom: 2px; }
        #world-time { font-size: 5.2rem; font-weight: 900; line-height: 1; margin-bottom: 12px; text-shadow: 0 0 25px rgba(120, 170, 255, 0.25); }
        #world-date { font-size: 1.25rem; font-weight: 700; opacity: 0.9; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
        #city-country { font-size: 1rem; font-weight: 800; opacity: 0.6; text-transform: uppercase; letter-spacing: 5px; }
        
        .local-timer-wrap {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(120, 170, 255, 0.22); 
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .local-timer-label {
            font-size: 1.1rem; 
            font-weight: 800;
            opacity: 0.8; 
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .local-timer-val {
            font-family: 'Unbounded', 'Montserrat', sans-serif;
            font-size: 2.5rem; 
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 0px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.15);
        }

        .ribbon { position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
        #ribbon-fill { 
            height: 100%; 
            width: 0%; 
            background: #ffffff; 
            box-shadow: 0 0 10px #ffffff; 
            transition: width 0.1s linear; 
        }

        .msk-clock-widget {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid rgba(120, 170, 255, 0.16);
        }
        .footer-clock {
            display: flex;
            flex-direction: column;
            text-align: left;
        }
        .f-time { font-size: 3.3rem; font-weight: 900; line-height: 1; color: #ffffff; text-shadow: 0 0 25px rgba(120, 170, 255, 0.2); }
        .f-date { font-size: 1.1rem; opacity: 0.4; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-top: 10px; }

        #main-timer-wrap { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            flex-grow: 1; 
            position: relative; 
        }
        
        .main-header { 
            margin-bottom: 15px; 
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .main-header h1 { 
            font-size: 8.4rem; 
            font-weight: 900; 
            letter-spacing: -2px; 
            line-height: 0.95; 
            color: var(--accent-blue); 
            white-space: nowrap; 
            display: inline-block;
            text-shadow: 0 0 35px rgba(77, 166, 255, 0.4), 0 0 80px rgba(77, 166, 255, 0.15);
        }
        
        .timer-section {
            padding: 15px 20px;
            margin: 0 20px;
            position: relative;
        }

        .watermark-bg-text {
            position: absolute;
            bottom: -45px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Montserrat', sans-serif;
            font-size: 11rem;
            font-weight: 900;
            letter-spacing: 12px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.06);
            white-space: nowrap;
            pointer-events: none;
            user-select: none;
            z-index: 0;
        }

        .timer-display { display: flex; align-items: center; justify-content: center; gap: 12px; }
        .t-col { display:flex; flex-direction:column; align-items:center; min-width: clamp(100px, 8vw, 150px); padding:0 10px; }
        
        .t-num {
            display: inline-block;
            font-family: 'Unbounded', 'Montserrat', sans-serif;
            font-size: clamp(5rem, 6.8vw, 8.8rem); 
            font-weight: 900 !important;
            line-height: 0.85;
            letter-spacing: -3px; 
            font-variant-numeric: lining-nums tabular-nums;
            background: linear-gradient(180deg, #ffffff 0%, #cfe8ff 55%, #6fa8ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 20px rgba(77,166,255,.45));
            transform-origin: center;
        }

        .t-lab { font-size: 1.3rem; font-weight: 800; color: rgba(255, 255, 255, 0.45); text-transform: uppercase; letter-spacing: 3px; margin-top: 8px; }
        .t-sep { font-size: clamp(3.5rem, 4.5vw, 6.5rem); font-weight: 900; color: #769fcd; opacity: 0.65; line-height: 0.85; margin-bottom: 24px; }

        .timezone-info-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .countdown-city-country {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: #ffffff;
            opacity: 0.85; 
            text-shadow: 0 0 15px rgba(77, 166, 255, 0.2);
            display: inline-block;
        }

        .timezone-separator {
            font-size: 1.4rem;
            color: #ffffff;
            opacity: 0.7;
            font-weight: 800;
        }

        .timezone-tag { 
            font-size: 1.4rem; 
            font-weight: 800; 
            letter-spacing: 3px; 
            opacity: 0.65; 
            text-transform: uppercase; 
            display: inline-block;
        }

        .progress-block { padding: 20px 40px; margin-top: 15px; width: 100%; align-items: center; }
        #progress-text { font-size: clamp(1.6rem, 2.2vw, 2.6rem); font-weight: 800; margin-bottom: 20px; line-height: 1.2; }
        
        .p-wrap { 
            width: 85%; 
            height: 10px; 
            background: rgba(255,255,255,0.08); 
            border-radius: 5px; 
            overflow: hidden; 
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        
        .p-wrap.hidden {
            opacity: 0;
            transform: translateY(12px);
            pointer-events: none;
        }
        .p-bar { height: 100%; background: #ffffff; width: 0%; box-shadow: 0 0 15px #ffffff; border-radius: 5px; }

        #celebration-overlay {
            position: absolute;
            inset: -40px;
            background: #ffffff;
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 40px; 
        }

        .celebration-text {
            font-size: 14rem;
            font-weight: 900;
            line-height: 1;
            z-index: 102;
            color: var(--accent-blue);
            animation: celebratePulse 2.5s ease-in-out infinite;
        }

        @keyframes celebratePulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3)); }
            50% { transform: scale(1.15); filter: drop-shadow(0 0 40px rgba(255, 255, 255, 0.7)); }
        }

        .sparkle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 101;
            animation: sparkleAnim 4s ease-out infinite;
        }

        @keyframes sparkleAnim {
            0% { transform: translate(0, 0) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translate(var(--mx), var(--my)) scale(1.8); opacity: 0; }
        }

        .fade { animation: fadeEffect 0.6s ease; }
        @keyframes fadeEffect { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .animated-title span { 
            display: inline-block; 
            animation: letterWave 2.0s ease-in-out infinite; 
        }

        .animated-title {
            display: inline-block;
            animation: floatUpDown 4.0s ease-in-out infinite;
        }

        @keyframes floatUpDown {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes letterWave { 
            0%, 100% { 
                transform: translateY(0); 
            } 
            50% { 
                transform: translateY(-8px); 
            } 
        }
        
        .animated-title span:nth-child(1) { animation-delay: 0.05s; }
        .animated-title span:nth-child(2) { animation-delay: 0.10s; }
        .animated-title span:nth-child(3) { animation-delay: 0.15s; }
        .animated-title span:nth-child(4) { animation-delay: 0.20s; }
        .animated-title span:nth-child(5) { animation-delay: 0.25s; }
        .animated-title span:nth-child(6) { animation-delay: 0.30s; }
        .animated-title span:nth-child(7) { animation-delay: 0.35s; }
        .animated-title span:nth-child(8) { animation-delay: 0.40s; }
        .animated-title span:nth-child(9) { animation-delay: 0.45s; }
        .animated-title span:nth-child(10) { animation-delay: 0.50s; }
        .animated-title span:nth-child(11) { animation-delay: 0.55s; }
        .animated-title span:nth-child(12) { animation-delay: 0.60s; }
        .animated-title span:nth-child(13) { animation-delay: 0.65s; }
        .animated-title span:nth-child(14) { animation-delay: 0.70s; }
        .animated-title span:nth-child(15) { animation-delay: 0.75s; }

        /* === GRID GRADIENT BACKGROUND === */
        .grid-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            background-color: #1c2340;
            background-image:
                radial-gradient(ellipse at 50% 20%, rgba(90, 140, 255, 0.28) 0%, transparent 55%),
                radial-gradient(ellipse at 15% 85%, rgba(70, 100, 220, 0.18) 0%, transparent 60%),
                radial-gradient(ellipse at 85% 80%, rgba(60, 90, 200, 0.16) 0%, transparent 60%);
            animation: ambientGlow 8s ease-in-out infinite;
        }

        .grid-overlay::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 45% at 50% 6%, rgba(130, 180, 255, 0.14) 0%, transparent 65%),
                radial-gradient(ellipse 120% 90% at 50% 55%, transparent 45%, rgba(1, 4, 10, 0.5) 100%);
        }

        @keyframes ambientGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.12); }
        }

        /* === GRID LINES on top of mesh === */
        .grid-overlay::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(77, 166, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(77, 166, 255, 0.1) 1px, transparent 1px),
                linear-gradient(rgba(77, 166, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(77, 166, 255, 0.04) 1px, transparent 1px);
            background-size: 100px 100px, 100px 100px, 25px 25px, 25px 25px;
            animation: gridPulse 6s ease-in-out infinite;
        }
        @keyframes gridPulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        /* === WATERMARK === */
        .watermark {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.22);
            white-space: nowrap;
            pointer-events: none;
            user-select: none;
            z-index: 10;
            display: block;
        }
        .watermark-hero {
            position: absolute;
            top: -12px;
            left: 0px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .watermark-yt-icon {
            width: 38px;
            height: 27px;
            color: rgba(255, 255, 255, 0.22);
            flex-shrink: 0;
        }
        .watermark-yt-names {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
        }
        .watermark-yt-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.1rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: none;
            color: rgba(255, 255, 255, 0.22);
            line-height: 1;
        }
        .watermark-yt-handle {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: none;
            color: rgba(255, 255, 255, 0.18);
            line-height: 1;
            align-self: flex-start;
            margin-left: 0;
        }
        .watermark-city {
            position: absolute;
            bottom: 14px;
            left: 0px;
        }

        /* === BACKGROUND IMAGE OVERLAY === */
        #bg-img-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        #bg-img-overlay.visible {
            opacity: 0.12;
        }

        /* ==================== CHAT JOKE NOTIFICATIONS ==================== */
        #chat-joke-notif-container {
            position: fixed;
            right: 5.5vw;
            bottom: 7vh;
            z-index: 50;
            display: flex;
            flex-direction: column-reverse;
            gap: 16px;
            align-items: flex-end;
            pointer-events: none;
            max-width: 440px;
        }

        .chat-joke-notif {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 224px;
            padding: 30px 20px 24px;
            background: linear-gradient(135deg, rgba(18, 26, 48, 0.82), rgba(10, 16, 32, 0.82));
            backdrop-filter: blur(16px) saturate(140%);
            -webkit-backdrop-filter: blur(16px) saturate(140%);
            border: 1.5px solid rgba(77, 166, 255, 0.35);
            border-radius: 20px;
            box-shadow:
                0 14px 34px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.03) inset,
                inset 0 1px 0 rgba(255, 255, 255, 0.14);
            font-family: 'Montserrat', sans-serif;
            color: #ffffff;
            text-align: center;
            overflow: hidden;
            opacity: 0;
            transform: translateX(60px) scale(0.9);
            --glow: rgba(77, 166, 255, 0.55);
        }

        .chat-joke-notif.show {
            animation: cjnPopIn 0.6s cubic-bezier(0.22, 1.1, 0.36, 1) forwards,
                       cjnGlowPulse 2.2s ease-in-out 0.6s infinite;
        }

        .chat-joke-notif.hide {
            opacity: 1;
            animation: cjnPopOut 0.45s ease forwards;
        }

        @keyframes cjnPopIn {
            0%   { opacity: 0; transform: translateX(60px) scale(0.88); }
            55%  { opacity: 1; transform: translateX(-8px) scale(1.035); }
            80%  { transform: translateX(2px) scale(0.995); }
            100% { opacity: 1; transform: translateX(0) scale(1); }
        }

        @keyframes cjnPopOut {
            0%   { opacity: 1; transform: translateX(0) scale(1); }
            100% { opacity: 0; transform: translateX(40px) scale(0.92); }
        }

        @keyframes cjnGlowPulse {
            0%, 100% { box-shadow: 0 14px 34px rgba(0,0,0,0.5), 0 0 22px var(--glow), inset 0 1px 0 rgba(255,255,255,0.14); border-color: rgba(77, 166, 255, 0.35); }
            50%      { box-shadow: 0 14px 34px rgba(0,0,0,0.5), 0 0 42px var(--glow), inset 0 1px 0 rgba(255,255,255,0.18); border-color: rgba(77, 166, 255, 0.65); }
        }

        /* Пробегающий блик при появлении */
        .chat-joke-notif::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 55%; height: 100%;
            background: linear-gradient(100deg, transparent, rgba(255,255,255,0.16) 45%, transparent 90%);
            transform: translateX(-160%) skewX(-12deg);
            pointer-events: none;
        }

        .chat-joke-notif.show::before {
            animation: cjnShimmer 1.1s ease-out 0.15s 1;
        }

        @keyframes cjnShimmer {
            to { transform: translateX(260%) skewX(-12deg); }
        }

        /* Полоска-таймер до автоскрытия */
        .cjn-progress {
            position: absolute;
            left: 0; bottom: 0;
            height: 4px;
            width: 100%;
            background: linear-gradient(90deg, var(--accent-blue), #8fd3ff);
            border-radius: 0 0 20px 20px;
            transform-origin: left center;
            animation: cjnProgress linear forwards;
            opacity: 0.85;
        }

        @keyframes cjnProgress {
            from { transform: scaleX(1); }
            to   { transform: scaleX(0); }
        }

        .chat-joke-notif .cjn-icon {
            position: relative;
            flex: 0 0 auto;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #6fc3ff, #2a6fd6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.85rem;
            box-shadow: 0 0 20px rgba(77, 166, 255, 0.65);
            animation: cjnIconBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
            margin-bottom: 4px;
        }

        @keyframes cjnIconBounce {
            0%   { transform: scale(0) rotate(-25deg); }
            60%  { transform: scale(1.18) rotate(8deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .chat-joke-notif .cjn-icon::after {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 1.5px solid var(--glow);
            opacity: 0;
            animation: cjnRing 1.8s ease-out 0.35s 2;
        }

        @keyframes cjnRing {
            0%   { opacity: 0.7; transform: scale(0.7); }
            100% { opacity: 0; transform: scale(1.7); }
        }

        /* Крупная команда, например "!67" */
        .chat-joke-notif .cjn-cmd-big {
            font-family: 'Unbounded', 'Montserrat', sans-serif;
            font-size: 2.8rem;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.5px;
            color: #8fd3ff;
            text-shadow: 0 0 22px var(--glow);
        }

        /* Юзернейм автора шутки, например "@username" */
        .chat-joke-notif .cjn-username {

        const timezoneSequence = [

        function getEpochForOffset(offset) {
            const baseUTC = Date.UTC(2027, 0, 1, 0, 0, 0); 
            return baseUTC - (offset * 3600000);
        }

        function getNewYearEpochForTimezone(tz) {
            try {
                const formatter = new Intl.DateTimeFormat('en-US', {
                    timeZone: tz,
                    year: 'numeric', month: 'numeric', day: 'numeric',
                    hour: 'numeric', minute: 'numeric', second: 'numeric',
                    hourCycle: 'h23', hour12: false
                });
                const guessUTC = Date.UTC(2027, 0, 1);
                const parts = formatter.formatToParts(new Date(guessUTC));
                const getVal = type => parseInt(parts.find(p => p.type === type).value, 10);
                const localEpoch = Date.UTC(
                    getVal('year'),
                    getVal('month') - 1,
                    getVal('day'),
                    getVal('hour') === 24 ? 0 : getVal('hour'),
                    getVal('minute'),
                    getVal('second')
                );
                return guessUTC + (guessUTC - localEpoch);
            } catch (e) {
                return Date.UTC(2027, 0, 1, 0, 0, 0) - 3 * 3600000; 
            }
        }

        function evaluateTargetTimezone() {
            const now = Date.now();
            let foundIndex = -1;
            
            for (let i = 0; i < timezoneSequence.length; i++) {
                const epoch = getEpochForOffset(timezoneSequence[i].offset);
                if (now < epoch) {
                    if (foundIndex === -1) {
                        foundIndex = i;
                    }
                }
            }
            
            if (foundIndex === -1) {
                if (!isCelebrationActive) {
                    triggerCelebration();
                }
            } else {
                if (foundIndex !== currentTargetIndex) {
                    currentTargetIndex = foundIndex;
                    const target = timezoneSequence[currentTargetIndex];
                    targetNewYearEpoch = getEpochForOffset(target.offset);
                    
                    document.getElementById('countdown-city-country-label').innerText = target.name;
                    document.querySelector('.timezone-tag').innerText = target.tag;
                }
            }
        }

        function triggerCelebration() {
            isCelebrationActive = true;
            const overlay = document.getElementById('celebration-overlay');
            if (overlay) {
                overlay.style.display = 'flex';
                for (let i = 0; i < 60; i++) {
                    createSparkle(overlay);
                }
            }
        }

            sparkle.style.height = size + 'px';
            sparkle.style.left = Math.random() * 100 + '%';
            sparkle.style.top = Math.random() * 100 + '%';
            sparkle.style.setProperty('--mx', (Math.random() * 400 - 200) + 'px');
            sparkle.style.setProperty('--my', (Math.random() * 400 - 200) + 'px');
            
            const colors = [
                'radial-gradient(circle, rgba(0, 212, 255, 0.8) 0%, transparent 75%)',

            sparkle.style.background = colors[Math.floor(Math.random() * colors.length)];
            sparkle.style.animationDelay = Math.random() * 3 + 's';
            parent.appendChild(sparkle);
        }

        function safeLocaleTimeString(date, tz) {
            try {
                return date.toLocaleTimeString('ru-RU', { timeZone: tz });
            } catch (e) {
                console.error("Неподдерживаемый часовой пояс для времени:", tz, e);
                return date.toLocaleTimeString('ru-RU');
            }
        }

        function safeLocaleDateString(date, tz) {
            try {
                return date.toLocaleDateString('ru-RU', { timeZone: tz, day: 'numeric', month: 'long', year: 'numeric' });
            } catch (e) {
                console.error("Неподдерживаемый часовой пояс для даты:", tz, e);
                return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
            }
        }

        async function fetchWeatherForCity(cityObj) {
            const apiKey = 'b0c6b001de53ac74ec80ea44f573cb50';
            
            const tzParts = cityObj.z.split('/');
            let engName = tzParts[tzParts.length - 1].replace(/_/g, ' ');

            let queryName = engName;
            let url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(queryName)}&appid=${apiKey}&units=metric&lang=ru`;
            
            const tempEl = document.getElementById('weather-temp');
            const descEl = document.getElementById('weather-desc');
            const iconEl = document.getElementById('weather-icon');

            tempEl.innerText = '--°C';
            descEl.innerText = 'Загрузка...';
            iconEl.style.display = 'none';

            try {
                let response = await fetch(url);
                
                if (!response.ok) {
                    queryName = cityObj.n;
                    url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(queryName)}&appid=${apiKey}&units=metric&lang=ru`;
                    response = await fetch(url);
                }

                if (!response.ok) throw new Error('Weather data fetch failed');
                const data = await response.json();

                const tempVal = Math.round(data.main.temp);
                const description = data.weather[0].description;
                const iconCode = data.weather[0].icon;

                tempEl.innerText = `${tempVal > 0 ? '+' : ''}${tempVal}°C`;
                descEl.innerText = description;
                iconEl.src = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
                iconEl.style.display = 'block';
            } catch (err) {
                console.error("Ошибка получения погоды для:", cityObj.n, err);
                tempEl.innerText = '--';
                descEl.innerText = 'нет данных';
                iconEl.style.display = 'none';
            }
        }

        function update() {
            try {
                const now = Date.now();
                const nowDate = new Date();

                evaluateTargetTimezone();

                const curCity = clockCities[cityIdx];
                if (curCity) {
                    document.getElementById('world-time').innerText = safeLocaleTimeString(nowDate, curCity.z);
                    document.getElementById('world-date').innerText = safeLocaleDateString(nowDate, curCity.z);
                }
                
                if (localCityNewYearEpoch > 0) {
                    const localDiff = localCityNewYearEpoch - now;
                    if (localDiff > 0) {
                        const lD = Math.floor(localDiff / 86400000).toString().padStart(2, '0');
                        const lH = Math.floor((localDiff / 3600000) % 24).toString().padStart(2, '0');
                        const lM = Math.floor((localDiff / 60000) % 60).toString().padStart(2, '0');
                        const lS = Math.floor((localDiff / 1000) % 60).toString().padStart(2, '0');
                        document.getElementById('local-countdown').innerText = `${lD}:${lH}:${lM}:${lS}`;
                    } else {
                        document.getElementById('local-countdown').innerText = "00:00:00:00";
                    }
                }
                
                document.getElementById('f-msk-time').innerText = safeLocaleTimeString(nowDate, 'Europe/Moscow');
                document.getElementById('f-msk-date').innerText = safeLocaleDateString(nowDate, 'Europe/Moscow') + ' (мск)';

                const pctYear = Math.max(0, Math.min(100, Math.floor(((now - yearStart) / (yearEndGlobal - yearStart)) * 100)));
                document.getElementById('p-bar').style.width = pctYear + "%";

                const diff = targetNewYearEpoch - now;
                if (diff > 0 && !isCelebrationActive) {
                    document.getElementById('d').innerText = Math.floor(diff/86400000).toString().padStart(3, '0');
                    document.getElementById('h').innerText = Math.floor((diff/3600000)%24).toString().padStart(2,'0');
                    document.getElementById('m').innerText = Math.floor((diff/60000)%60).toString().padStart(2,'0');
                    document.getElementById('s').innerText = Math.floor((diff/1000)%60).toString().padStart(2,'0');
                } else {
                    document.getElementById('d').innerText = "000";
                    document.getElementById('h').innerText = "00";
                    document.getElementById('m').innerText = "00";
                    document.getElementById('s').innerText = "00";
                }

                const progressTextNode = document.getElementById('progress-text');
                const pWrapNode = document.querySelector('.p-wrap');

                if (progressCycleState !== 1) {
                    progressCycleState = 1;
                    progressTextNode.classList.remove('fade'); void progressTextNode.offsetWidth;
                    progressTextNode.innerText = `Год прошел на ${pctYear}%`;
                    progressTextNode.classList.add('fade');
                    if (pWrapNode) pWrapNode.classList.remove('hidden'); 
                } else {
                    progressTextNode.innerText = `Год прошел на ${pctYear}%`;
                }

                timerCity += 100;
                document.getElementById('ribbon-fill').style.width = (timerCity / 10000 * 100) + "%";
                if (timerCity >= 10000) { 
                    let nextIdx;
                    do {
                        nextIdx = Math.floor(Math.random() * clockCities.length);
                    } while (nextIdx === cityIdx && clockCities.length > 1);
                    
                    cityIdx = nextIdx;
                    switchCityUI(); 
                    timerCity = 0; 
                }
            } catch (err) {
                console.error("Ошибка в итерации цикла обновления интерфейса:", err);
            }
        }

        function switchCityUI() {
            try {
                const c = clockCities[cityIdx];
                if (c) {
                    document.getElementById('flag-bg').style.backgroundImage = `url('${c.f}')`;
                    const wrap = document.getElementById('city-info-wrap');
                    wrap.classList.remove('fade'); void wrap.offsetWidth;
                    document.getElementById('city-name').innerText = c.n;
                    document.getElementById('city-country').innerText = c.c;
                    
                    localCityNewYearEpoch = getNewYearEpochForTimezone(c.z);
                    
                    fetchWeatherForCity(c);
                    
                    wrap.classList.add('fade');
                }
            } catch (e) {
                console.error("Ошибка анимации города:", e);
            }
        }

        window.addEventListener('resize', () => {

        });
        document.getElementById('flag-bg').style.backgroundImage = `url('${clockCities[cityIdx].f}')`;
        
        evaluateTargetTimezone();

        setInterval(update, 100); 
        update();

        let bgCurrentIdx = -1;

                setTimeout(() => {

    <script>
        // ==================== CLOUDS + STARS ====================
        (function () {
            const canvas = document.getElementById('weather-canvas');
            const ctx = canvas.getContext('2d');
            let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

            function resize() {
                W = window.innerWidth;
                H = window.innerHeight;
                canvas.width = W * DPR;
                canvas.height = H * DPR;
                canvas.style.width = W + 'px';
                canvas.style.height = H + 'px';
                ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
            }
            window.addEventListener('resize', resize);
            resize();

            // ---------- Clouds ----------
            function makeCloud(spawnOnScreen) {
                const scale = 0.6 + Math.random() * 1.3;
                return {
                    x: spawnOnScreen ? Math.random() * W : -400 * scale,
                    y: H * (0.03 + Math.random() * 0.35),
                    scale: scale,
                    speed: (6 + Math.random() * 10) * (0.4 + scale * 0.4) / 60,
                    alpha: 0.10 + Math.random() * 0.16,
                    puffs: (() => {
                        const n = 5 + Math.floor(Math.random() * 3);
                        const arr = [];
                        let cx = 0;
                        for (let i = 0; i < n; i++) {
                            arr.push({
                                dx: cx,
                                dy: (Math.random() - 0.5) * 26,
                                r: 34 + Math.random() * 38
                            });
                            cx += 34 + Math.random() * 30;
                        }
                        return arr;
                    })()
                };
            }

            const clouds = [];
            const CLOUD_COUNT = 0;
            for (let i = 0; i < CLOUD_COUNT; i++) clouds.push(makeCloud(true));

            function drawCloud(c) {
                ctx.save();
                ctx.translate(c.x, c.y);
                ctx.scale(c.scale, c.scale);
                ctx.globalAlpha = c.alpha;
                for (const p of c.puffs) {
                    const g = ctx.createRadialGradient(p.dx, p.dy, 0, p.dx, p.dy, p.r);
                    g.addColorStop(0, 'rgba(255,255,255,0.9)');
                    g.addColorStop(1, 'rgba(255,255,255,0)');
                    ctx.fillStyle = g;
                    ctx.beginPath();
                    ctx.arc(p.dx, p.dy, p.r, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }

            function updateClouds() {
                for (const c of clouds) {
                    c.x += c.speed;
                    if (c.x - 300 * c.scale > W) {
                        Object.assign(c, makeCloud(false));
                    }
                }
            }

            // ---------- Main loop ----------
            // Warm up: fast-forward the cloud simulation so, on load/refresh,
            // the clouds already look mid-drift instead of just starting.
            for (let i = 0; i < 240; i++) {
                updateClouds();
            }

            function loop() {
                ctx.clearRect(0, 0, W, H);

                updateClouds();
                for (const c of clouds) drawCloud(c);

                requestAnimationFrame(loop);
            }
            loop();
        })();
    </script>

    <script>
        // ==================== YOUTUBE LIVE CHAT — JOKE COMMAND WATCHER ====================
        // Отслеживает сообщения "!67" и "!52" в чате трансляции и показывает
        // уведомление "Пользователь ... пошутил про !.." в правом нижнем углу экрана.
        (function () {
            const CONFIG = {
                // YouTube Data API v3 ключ
                API_KEY: 'AIzaSyAP0i1Ua8yYmT-vV3QXFE5n-LnEjnLezo4',
                VIDEO_ID: 'LiZt414GcEo',
                // Команды, на которые реагируем (без "!")
                COMMANDS: ['67', '52'],
                // Минимальный интервал опроса чата (мс), чтобы не превышать квоту API
                MIN_POLL_INTERVAL: 4000,
                // Сколько уведомление держится на экране (мс)
                NOTIF_LIFETIME: 6000,
                // Максимум одновременно показанных уведомлений
                MAX_VISIBLE: 4
            };

            const container = document.getElementById('chat-joke-notif-container');
            let liveChatId = null;
            let nextPageToken = undefined;
            let seenMessageIds = new Set();

            function escapeHtml(str) {
                const d = document.createElement('div');
                d.textContent = str;
                return d.innerHTML;
            }

            function buildCommandRegex() {
                const escaped = CONFIG.COMMANDS.map(c => c.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
                return new RegExp('(?:^|\\s)!(' + escaped.join('|') + ')(?=\\s|$)', 'i');
            }
            const CMD_REGEX = buildCommandRegex();

            // Иконка под конкретную команду (можно расширять/менять на свои эмодзи)
            const CMD_ICONS = {
                '67': '🗿',
                '52': '🤣'
            };

            function showJokeNotification(authorName, command) {
                const el = document.createElement('div');
                el.className = 'chat-joke-notif';
                el.dataset.cmd = command;

                const icon = CMD_ICONS[command] || '😂';
                const durationSec = (CONFIG.NOTIF_LIFETIME / 1000).toFixed(2);

                el.innerHTML =
                    '<div class="cjn-icon">' + icon + '</div>' +
                    '<div class="cjn-cmd-big">!' + escapeHtml(command) + '</div>' +
                    '<div class="cjn-username">@' + escapeHtml(authorName) + '</div>' +
                    '<div class="cjn-progress" style="animation-duration:' + durationSec + 's"></div>';

                container.appendChild(el);

                // Ограничиваем число одновременно показанных уведомлений
                while (container.children.length > CONFIG.MAX_VISIBLE) {
                    container.removeChild(container.firstChild);
                }

                requestAnimationFrame(() => {
                    requestAnimationFrame(() => el.classList.add('show'));
                });

                setTimeout(() => {
                    el.classList.remove('show');
                    el.classList.add('hide');
                    setTimeout(() => el.remove(), 500);
                }, CONFIG.NOTIF_LIFETIME);
            }

            async function fetchLiveChatId() {
                const url = 'https://www.googleapis.com/youtube/v3/videos'
                    + '?part=liveStreamingDetails&id=' + encodeURIComponent(CONFIG.VIDEO_ID)
                    + '&key=' + encodeURIComponent(CONFIG.API_KEY);
                const res = await fetch(url);
                const data = await res.json();
                const item = data.items && data.items[0];
                const chatId = item && item.liveStreamingDetails && item.liveStreamingDetails.activeLiveChatId;
                return chatId || null;
            }

            async function pollMessages() {
                if (!liveChatId) return CONFIG.MIN_POLL_INTERVAL;

                const url = 'https://www.googleapis.com/youtube/v3/liveChat/messages'
                    + '?liveChatId=' + encodeURIComponent(liveChatId)
                    + '&part=snippet,authorDetails'
                    + '&key=' + encodeURIComponent(CONFIG.API_KEY)
                    + (nextPageToken ? '&pageToken=' + encodeURIComponent(nextPageToken) : '');

                const res = await fetch(url);
                if (!res.ok) {
                    console.warn('Ошибка опроса чата YouTube:', res.status);
                    return Math.max(CONFIG.MIN_POLL_INTERVAL, 10000);
                }
                const data = await res.json();
                nextPageToken = data.nextPageToken;

                (data.items || []).forEach(msg => {
                    const id = msg.id;
                    if (!id || seenMessageIds.has(id)) return;
                    seenMessageIds.add(id);

                    const text = msg.snippet && msg.snippet.displayMessage;
                    if (!text) return;

                    const match = text.match(CMD_REGEX);
                    if (match) {
                        const author = (msg.authorDetails && msg.authorDetails.displayName) || 'Зритель';
                        showJokeNotification(author, match[1]);
                    }
                });

                // Не даём seenMessageIds расти бесконечно
                if (seenMessageIds.size > 2000) {
                    seenMessageIds = new Set(Array.from(seenMessageIds).slice(-1000));
                }

                return Math.max(CONFIG.MIN_POLL_INTERVAL, data.pollingIntervalMillis || CONFIG.MIN_POLL_INTERVAL);
            }

            async function loop() {
                let delay = CONFIG.MIN_POLL_INTERVAL;
                try {
                    if (!liveChatId) {
                        liveChatId = await fetchLiveChatId();
                        if (!liveChatId) {
                            // Трансляция ещё не началась или чат недоступен — пробуем позже
                            delay = 15000;
                        }
                    } else {
                        delay = await pollMessages();
                    }
                } catch (e) {
                    console.warn('Chat watcher error:', e);
                    delay = 10000;
                }
                setTimeout(loop, delay);
            }

            if (CONFIG.API_KEY && CONFIG.API_KEY !== 'ВАШ_YOUTUBE_API_KEY') {
                loop();
            } else {
                console.warn('YouTube Chat Watcher: укажите API_KEY в CONFIG, чтобы включить отслеживание чата.');
            }
        })();
    </script>
</body>
